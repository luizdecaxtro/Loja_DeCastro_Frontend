<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja DeCastro</title>
</head>
<body>
  <h1>Bem-vindo à Loja DeCastro</h1>
  <p>Livro Estatística - R$ 49,90</p>
  <button id="checkout">Comprar</button>

  <script>
    document.getElementById("checkout").addEventListener("click", () => {
      fetch("https://SEU-PROJETO.vercel.app/api/create-preference", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: "Livro Estatística",
          price: 49.90,
          quantity: 1
        })
      })
      .then(res => res.json())
      .then(data => {
        window.location.href = data.init_point;
      });
    });
  </script>
</body>
</html>
