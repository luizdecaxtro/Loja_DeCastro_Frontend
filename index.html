<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja DeCastro - Início</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
  <style>
    /* --- Estilos específicos da Home --- */
    .carousel {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: 2rem;
    }
    .carousel img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: none;
    }
    .carousel img.active {
      display: block;
      animation: fade 1s ease-in-out;
    }
    @keyframes fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }
    .featured-products {
      text-align: center;
      margin: 2rem auto;
    }
    .featured-products h2 {
      margin-bottom: 1rem;
      color: #4E342E; /* marrom */
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      padding: 0 1rem;
    }
    .product-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 1rem;
      transition: transform 0.3s;
    }
    .product-card:hover {
      transform: translateY(-5px);
    }
    .product-card img {
      max-width: 100%;
      border-radius: 8px;
    }
    .product-card h3 {
      margin: 0.5rem 0;
      color: #3E2723;
    }
    .product-card p {
      color: #6D4C41;
    }
    .product-card button {
      background: #795548;
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .product-card button:hover {
      background: #A1887F;
    }
    .trust-section {
      display: flex;
      justify-content: space-around;
      margin: 3rem 1rem;
      text-align: center;
    }
    .trust-item {
      flex: 1;
      padding: 1rem;
    }
    .trust-item h4 {
      margin-top: 0.5rem;
      color: #4E342E;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bem-vindo à Loja DeCastro</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="produtos.html">Produtos</a>
      <a href="carrinho.html">Carrinho</a>
      <a href="contato.html">Contato</a>
    </nav>
  </header>

  <!-- Carrossel -->
  <section class="carousel">
    <img src="assets/banner1.jpg" alt="Promoção 1" class="active">
    <img src="assets/banner2.jpg" alt="Promoção 2">
    <img src="assets/banner3.jpg" alt="Promoção 3">
  </section>

  <!-- Produtos em destaque -->
  <section class="featured-products">
    <h2>Produtos em Destaque</h2>
    <div class="product-grid" id="featured-products">
      <!-- Produtos serão carregados via JS -->
    </div>
  </section>

  <!-- Confiança -->
  <section class="trust-section">
    <div class="trust-item">
      <span>🛡️</span>
      <h4>Compra Segura</h4>
    </div>
    <div class="trust-item">
      <span>⚡</span>
      <h4>Entrega Imediata</h4>
    </div>
    <div class="trust-item">
      <span>💳</span>
      <h4>Pix e Cartão</h4>
    </div>
  </section>

  <footer>
    <p>&copy; 2024 Loja DeCastro. Todos os direitos reservados.</p>
  </footer>

  <script>
    // Carrossel simples
    let slideIndex = 0;
    const slides = document.querySelectorAll(".carousel img");
    function showSlides() {
      slides.forEach((s, i) => s.classList.remove("active"));
      slideIndex = (slideIndex + 1) % slides.length;
      slides[slideIndex].classList.add("active");
    }
    setInterval(showSlides, 4000);

    // Carregar produtos em destaque
    fetch("produtos.json")
      .then(res => res.json())
      .then(produtos => {
        const container = document.getElementById("featured-products");
        produtos.slice(0, 4).forEach(prod => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.innerHTML = `
            <img src="${prod.imagem}" alt="${prod.nome}">
            <h3>${prod.nome}</h3>
            <p>R$ ${prod.preco.toFixed(2)}</p>
            <button onclick="adicionarAoCarrinho(${prod.id})">Adicionar ao Carrinho</button>
          `;
          container.appendChild(card);
        });
      });
  </script>
</body>
</html>
