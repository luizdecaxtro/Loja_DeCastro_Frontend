<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja DeCastro</title>
  <!-- SDK do Mercado Pago -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body>
  <h1>Bem-vindo à Loja DeCastro</h1>
  <button id="checkout-button">Comprar agora</button>

  <script>
    // Inicializa o Mercado Pago com a sua PUBLIC KEY
    const mp = new MercadoPago("APP_USR-d31c8e3a-1671-46ec-a730-eb4011a06e98", {
      locale: "pt-BR"
    });

    // Cria um checkout
    document.getElementById("checkout-button").addEventListener("click", async () => {
      const response = await fetch("https://SEU_PROJETO.vercel.app/api/create-preference", {
        method: "POST",
      });

      const preference = await response.json();

      mp.checkout({
        preference: {
          id: preference.id
        },
        autoOpen: true,
      });
    });
  </script>
</body>
</html>
