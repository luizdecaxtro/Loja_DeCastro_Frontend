<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja DeCastro — Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="menu">
  <div class="container row">
    <div class="logo">
      <div class="badge"><span></span></div>Loja DeCastro
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-nav="index">Início</a></li>
        <li><a href="produtos.html" data-nav="produtos">Produtos</a></li>
        <li><a href="carrinho.html" data-nav="carrinho">Carrinho <span id="nav-count"></span></a></li>
        <li><a href="contato.html" data-nav="contato">Contato</a></li>
        <li><a href="admin.html" data-nav="admin">Admin</a></li>
      </ul>
    </nav>
  </div>
</header>
<main class="container">

<section class="section-title"><h2>Admin — Produtos</h2><small style="color:#666">Somente no seu navegador (LocalStorage)</small></section>
<section class="card" style="padding:18px">
  <form id="form-produto">
    <div class="form-row">
      <div><label>Nome</label><input class="input" id="nome" required maxlength="80"></div>
      <div><label>Categoria</label><input class="input" id="categoria" placeholder="ex.: E-books, Planilhas..."></div>
    </div>
    <div class="form-row">
      <div><label>Preço (R$)</label><input class="input" id="preco" type="number" step="0.01" min="0" required></div>
      <div><label>Destaque</label><select id="destaque" class="input"><option value="false">Não</option><option value="true">Sim</option></select></div>
    </div>
    <div class="form-row">
      <div style="grid-column:1/-1"><label>Descrição</label><textarea id="descricao" class="input" rows="3"></textarea></div>
    </div>
    <div class="form-row">
      <div><label>Imagem do produto</label><input type="file" id="imagem" accept="image/*" class="input"></div>
      <div style="display:flex;align-items:flex-end"><img id="preview" style="height:80px;border-radius:12px;display:none"></div>
    </div>
    <div class="form-actions"><button class="btn" type="submit">Salvar</button><button class="btn secondary" type="reset" id="limpar">Limpar</button></div>
  </form>
</section>
<section class="section-title"><h2>Catálogo</h2></section>
<section><table class="table" id="tabela"><thead><tr><th>Imagem</th><th>Nome</th><th>Categoria</th><th>Preço</th><th>Destaque</th><th></th></tr></thead><tbody></tbody></table></section>

</main>
<footer class="container">© 2025 Loja DeCastro — todos os direitos reservados.</footer>
  <script src="js/admin.js"></script>
<script>
document.querySelectorAll('a[data-nav]').forEach(a=>{
  if(location.pathname.endsWith(a.getAttribute('data-nav')+'.html') || 
     (location.pathname.endsWith('/') && a.getAttribute('data-nav')==='index')) a.classList.add('active');
});
</script>
<script src="js/common.js"></script>
</body></html>
