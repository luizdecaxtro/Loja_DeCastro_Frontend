<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Loja DeCastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="menu">
  <nav class="container">
    <h1 class="logo">Loja DeCastro</h1>
    <ul class="menu-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="produtos.html">Produtos</a></li>
      <li><a href="carrinho.html">Carrinho</a></li>
      <li><a href="contato.html">Contato</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>
</header>

  <header>
    <nav class="navbar">
      <div class="logo">Loja DeCastro</div>
      <ul class="menu">
        <li><a href="index.html">Início</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="carrinho.html">Carrinho</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Administração de Produtos</h1>

    <!-- Formulário -->
    <form id="form-produto">
      <label for="nome">Nome do Produto:</label>
      <input type="text" id="nome" required>

      <label for="preco">Preço:</label>
      <input type="number" id="preco" step="0.01" required>

      <button type="submit" class="btn">Adicionar Produto</button>
    </form>

    <!-- Lista -->
    <h2>Produtos Cadastrados</h2>
    <div id="lista-produtos"></div>
  </main>

  <footer>
    <p>&copy; 2025 Loja DeCastro</p>
  </footer>

  <script>
    // Carrega produtos
    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    function atualizarLista() {
      const lista = document.getElementById("lista-produtos");
      lista.innerHTML = "";

      if (produtos.length === 0) {
        lista.innerHTML = "<p>Nenhum produto cadastrado.</p>";
        return;
      }

      produtos.forEach((p, index) => {
        lista.innerHTML += `
          <div class="produto-card">
            <h3>${p.nome}</h3>
            <p>R$ ${p.preco.toFixed(2)}</p>
            <button onclick="removerProduto(${index})" class="btn">Remover</button>
          </div>
        `;
      });
    }

    // Adiciona produto
    document.getElementById("form-produto").addEventListener("submit", function(e) {
      e.preventDefault();
      const nome = document.getElementById("nome").value;
      const preco = parseFloat(document.getElementById("preco").value);

      produtos.push({ nome, preco });
      localStorage.setItem("produtos", JSON.stringify(produtos));

      document.getElementById("form-produto").reset();
      atualizarLista();
    });

    // Remove produto
    function removerProduto(index) {
      produtos.splice(index, 1);
      localStorage.setItem("produtos", JSON.stringify(produtos));
      atualizarLista();
    }

    atualizarLista();
  </script>
</body>
</html>
