<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja De Castro - Produtos</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">Loja De Castro</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Início</a></li>
        <li><a href="produtos.html" class="active">Produtos</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
      <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </nav>
  </header>

  <main class="products-container">
    <div class="card">
      <img src="assets/produto1.jpg" alt="Produto X">
      <h2>Produto X</h2>
      <p>Descrição do produto X.</p>
      <span class="price">R$ 100,00</span>
      <button class="btn"><i class="fas fa-shopping-cart"></i> Comprar</button>
    </div>
    <div class="card">
      <img src="assets/produto2.jpg" alt="Produto Y">
      <h2>Produto Y</h2>
      <p>Descrição do produto Y.</p>
      <span class="price">R$ 200,00</span>
      <button class="btn"><i class="fas fa-shopping-cart"></i> Comprar</button>
    </div>
  </main>

  <footer>
    <p>© 2025 Loja De Castro</p>
    <div class="socials">
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
  </footer>
</body>
</html>
